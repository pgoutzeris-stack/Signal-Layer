app = "roots-signal-browser"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 2
    hard_limit = 3

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
