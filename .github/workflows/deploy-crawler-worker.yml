name: deploy crawler worker

on:
  push:
    branches: [main]
    paths:
      - "crawler-worker/**"
      - ".github/workflows/deploy-crawler-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ vars.ENABLE_CRAWLER_DEPLOY == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: crawler-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
